<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - Library</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Library Management System</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="books.html" class="active">Books</a>
            <a href="authors.html">Authors</a>
            <a href="categories.html">Categories</a>
            <a href="customers.html">Customers</a>
        </nav>
    </header>

    <main>
        <div class="grid-2" style="grid-template-columns: 1fr 2fr;">
            <!-- Add Book Form -->
            <div class="glass-panel">
                <h2>Add New Book</h2>
                <form id="addBookForm">
                    <div class="form-group">
                        <label for="title">Book Title</label>
                        <input type="text" id="title" required placeholder="Enter book title">
                    </div>
                    <div class="form-group">
                        <label for="author_id">Author</label>
                        <select id="author_id" required>
                            <option value="" disabled selected>Loading authors...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category_id">Category</label>
                        <select id="category_id" required>
                            <option value="" disabled selected>Loading categories...</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Add Book</button>
                </form>
            </div>

            <!-- List Books -->
            <div class="glass-panel">
                <h2>Book Catalog</h2>
                <div class="loader" id="loader"></div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Category</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
