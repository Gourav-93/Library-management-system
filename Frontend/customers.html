<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customers - Library</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Library Management System</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="books.html">Books</a>
            <a href="authors.html">Authors</a>
            <a href="categories.html">Categories</a>
            <a href="customers.html" class="active">Customers</a>
        </nav>
    </header>

    <main>
        <div class="grid-2" style="grid-template-columns: 1fr 2fr;">
            <!-- Add Customer Form -->
            <div class="glass-panel">
                <h2>Register New Customer</h2>
                <form id="addCustomerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="Enter customer name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="Enter email address">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" required placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" rows="3" required placeholder="Enter address"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Add Customer</button>
                </form>
            </div>

            <!-- List Customers -->
            <div class="glass-panel">
                <h2>Registered Customers</h2>
                <div class="loader" id="loader"></div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Address</th>
                            </tr>
                        </thead>
                        <tbody id="customersTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
